name: Backend CI

# Triggered only when something the api workspace cares about actually changes.
# Shared config (biome / tsconfig.base / lockfile / setup action) is included
# so that a change there still validates the api side. The frontend has its
# own paths-filtered workflow in `frontend-ci.yml`.
on:
  pull_request:
    paths:
      - "apps/api/**"
      - "package.json"
      - "bun.lock"
      - "biome.json"
      - ".github/workflows/backend-ci.yml"
      - ".github/actions/setup/**"
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "package.json"
      - "bun.lock"
      - "biome.json"
      - ".github/workflows/backend-ci.yml"
      - ".github/actions/setup/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LEFTHOOK: 0

jobs:
  setup:
    name: setup (install + cache)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          install: "true"

  format:
    name: format (biome — api)
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bunx biome check apps/api

  typecheck:
    name: typecheck (api)
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run --filter @app/api typecheck

  test:
    name: test (api)
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Tests run against a plain postgres:17-alpine services container —
    # the same major version we run via docker-compose locally and target
    # via Cloud SQL in production.
    services:
      db:
        image: postgres:17-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/app_test
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      # Schema bootstrap is handled by the test harness itself —
      # `apps/api/src/test/integration-db.ts` reads `./drizzle/*.sql` and
      # applies them on the first `createTestDb()` call (idempotent across
      # files in the same DB). No separate `drizzle-kit push` step needed.
      - run: bun run --filter @app/api test
