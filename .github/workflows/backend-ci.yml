name: Backend CI

# Triggered only when something the api workspace cares about actually changes.
# Shared config (biome / tsconfig.base / lockfile / setup action) is included
# so that a change there still validates the api side. The frontend has its
# own paths-filtered workflow in `frontend-ci.yml`.
on:
  pull_request:
    paths:
      - "apps/api/**"
      - "package.json"
      - "bun.lock"
      - "biome.json"
      - ".github/workflows/backend-ci.yml"
      - ".github/actions/setup/**"
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "package.json"
      - "bun.lock"
      - "biome.json"
      - ".github/workflows/backend-ci.yml"
      - ".github/actions/setup/**"

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  LEFTHOOK: 0

jobs:
  setup:
    name: setup (install + cache)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          install: "true"

  format:
    name: format (biome — api)
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bunx biome check apps/api

  typecheck:
    name: typecheck (api)
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run --filter @app/api typecheck

  test:
    name: test (api)
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Run api tests against the official Neon Local container so the production
    # `neon-http` driver path is exercised end-to-end. Neon Local provisions an
    # ephemeral branch on the configured Neon project at start-up and deletes
    # it on shutdown — each CI run gets a fresh DB without manual cleanup.
    #
    # Required repo secrets:
    #   NEON_API_KEY    — created at https://console.neon.tech/app/settings/api-keys
    #   NEON_PROJECT_ID — Project Settings → General → Project ID
    #
    # The previous PGlite-in-WASM setup flaked under heap exhaustion (#66 was
    # the 4-batch hotfix). The local dev path stays on PGlite (no env var
    # required) so contributor onboarding remains zero-setup.
    services:
      db:
        image: neondatabase/neon_local:latest
        ports:
          - 5432:5432
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          # DELETE_BRANCH defaults to true → ephemeral branch is removed on
          # container shutdown. Leave at default so we don't litter the project.
    env:
      # `db.localtest.me` is a public DNS name that resolves to 127.0.0.1, so
      # the runner reaches the service via that host. `integration-db.ts`
      # recognises this hostname and re-points the @neondatabase/serverless
      # driver's fetch endpoint to the local Neon container on :5432/sql.
      # The DB name `neondb` is the Neon project default.
      TEST_DATABASE_URL: postgres://neon:npg@db.localtest.me:5432/neondb?sslmode=no-verify
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      # Snapshot existing Neon branch IDs BEFORE the test step so the post-step
      # cleanup only deletes branches that appeared *during* this job. Without
      # this snapshot, cleanup would also wipe branches belonging to concurrent
      # CI runs on other PRs, breaking them.
      #
      # The Neon Local container is started by `services.db` above and creates
      # an ephemeral branch on its first API call (during the test step), so the
      # snapshot captures the project state pre-creation.
      - name: Snapshot pre-existing Neon branch IDs
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          curl -fsS \
            -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches" \
            | jq -r '.branches[].id' | sort > /tmp/neon-branches-before.txt
          echo "Snapshotted $(wc -l < /tmp/neon-branches-before.txt) branch(es)."

      - run: bun run --filter @app/api test

      # Delete branches that exist now but didn't before this job. Runs even on
      # test failure / cancel so leaks are bounded to a single job's worth of
      # branches. ISH-153 — without this, a cancelled job's container can't
      # finish DELETE_BRANCH cleanup and the project hits its branch quota
      # within a few CI runs (422 Unprocessable Entity on next branch create).
      #
      # `set +e` on the inner deletes so one failure doesn't abort the loop;
      # `comm -13` outputs lines unique to the second file (= newly created).
      - name: Delete Neon branches created during this job
        if: always()
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          curl -fsS \
            -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches" \
            | jq -r '.branches[].id' | sort > /tmp/neon-branches-after.txt
          new=$(comm -13 /tmp/neon-branches-before.txt /tmp/neon-branches-after.txt)
          if [ -z "$new" ]; then
            echo "No new branches to delete."
            exit 0
          fi
          echo "Deleting branches created during this job:"
          echo "$new"
          set +e
          for id in $new; do
            curl -fsS -X DELETE \
              -H "Authorization: Bearer $NEON_API_KEY" \
              "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/$id" \
              -o /dev/null \
              && echo "  deleted $id" \
              || echo "  FAILED $id (manual cleanup may be needed)"
          done
