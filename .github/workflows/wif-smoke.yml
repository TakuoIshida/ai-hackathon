name: wif-smoke

# Verifies that Workload Identity Federation is wired up correctly.
# Run manually after `infrastructure/bootstrap` has been applied for the target env.
# Each env has its own WIF provider + SA, so this is parameterised.

on:
  workflow_dispatch:
    inputs:
      env:
        description: target env
        required: true
        default: dev
        type: choice
        options:
          - dev
          - stg
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  smoke:
    name: WIF auth (${{ inputs.env }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.env }}
    steps:
      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_CI_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      # Secret に入れた値 (SA email / project_id) は GitHub が log で mask する
      # ため、`gcloud auth list` の出力は ***  表記になる。疎通確認は
      # 「auth が要る gcloud コマンドが通る」事実をもって行うのが最も簡潔。
      - name: Verify auth (run an authenticated gcloud command)
        run: |
          gcloud storage buckets list --filter="name~^tfstate-" --format="value(name,location)"
