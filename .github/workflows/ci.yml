name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  LEFTHOOK: 0

jobs:
  setup:
    name: setup (install + cache)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore or save node_modules cache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
          key: bun-deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

  format:
    name: format (biome)
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
          key: bun-deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          fail-on-cache-miss: true

      - run: bun run check

  typecheck:
    name: typecheck
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
          key: bun-deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          fail-on-cache-miss: true

      - run: bun run typecheck

  test:
    name: test
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
          key: bun-deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          fail-on-cache-miss: true

      - run: bun run test

  build:
    name: build
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
          key: bun-deps-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          fail-on-cache-miss: true

      - run: bun run build
