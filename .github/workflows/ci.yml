name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  LEFTHOOK: 0

jobs:
  setup:
    name: setup (install + cache)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          install: "true"

  format:
    name: format (biome)
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run check

  typecheck:
    name: typecheck
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run typecheck

  test:
    name: test
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Run api tests against a real Postgres + Neon serverless HTTP proxy so the
    # production `neon-http` driver path is exercised end-to-end. This replaces
    # the PGlite-in-WASM setup that was flaking under heap exhaustion when many
    # `new PGlite()` instances were created in a single Bun process. The local
    # path (no env var) keeps using PGlite for zero-setup contributor onboarding.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: main
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      # Bridges the @neondatabase/serverless HTTP driver to plain Postgres so
      # tests use the same code path as production without a real Neon account.
      # See https://github.com/TimoWilhelm/local-neon-http-proxy
      neon-proxy:
        image: ghcr.io/timowilhelm/local-neon-http-proxy:main
        env:
          PG_CONNECTION_STRING: postgres://postgres:postgres@postgres:5432/main
        ports:
          - 4444:4444
    env:
      # `db.localtest.me` is a public DNS name that resolves to 127.0.0.1, so
      # the runner can reach the proxy via that host without /etc/hosts editing.
      # `integration-db.ts` recognises this hostname and switches the neon
      # serverless driver's fetch endpoint to the local proxy on :4444.
      TEST_DATABASE_URL: postgres://postgres:postgres@db.localtest.me:5432/main
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run test

  coverage:
    name: coverage (web)
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-web
          path: apps/web/coverage
          retention-days: 7

  build:
    name: build
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: bun run build

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 1
          if-no-files-found: error

  e2e:
    name: e2e (shard ${{ matrix.shard }}/${{ strategy.job-total }})
    needs: [setup, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      # The shared `build` artifact is produced WITHOUT the E2E auth bypass,
      # so it can't drive the dashboard specs. apps/e2e/playwright.config.ts
      # rebuilds the web bundle with VITE_E2E_BYPASS_AUTH=1 before serving it
      # via `vite preview` — see ISH-139. We still depend on `build` so the
      # tsc -b cache is warm when the rebuild runs.

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/e2e/package.json', 'bun.lock') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright OS deps (cache hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Run e2e (shard ${{ matrix.shard }}/${{ strategy.job-total }})
        run: bun run --filter @app/e2e e2e -- --shard=${{ matrix.shard }}/${{ strategy.job-total }}

      - name: Upload blob report
        if: always() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: apps/e2e/blob-report
          retention-days: 1
          if-no-files-found: ignore

  e2e-report:
    name: e2e merged report
    needs: e2e
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: apps/e2e/all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML report
        working-directory: apps/e2e
        run: bunx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/e2e/playwright-report
          retention-days: 7
          if-no-files-found: error
