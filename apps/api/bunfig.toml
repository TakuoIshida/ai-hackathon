# Bun configuration scoped to the @app/api workspace.
#
# `[test] preload` runs the listed files exactly once at the start of
# `bun test`, before any test file is imported. We use it to force-set
# Clerk publishable / secret / webhook stubs that pass the SDK's
# `parsePublishableKey` validator regardless of what `.env` supplies —
# fixes ISH-145 (cross-file test pollution / load order causing 21
# `401` tests to fail with "Publishable key not valid").

[test]
# `env-bootstrap.ts` sets stub Clerk env (ISH-145).
# `mock-http.ts` registers `mock.module("@/lib/http", ...)` BEFORE any test file
# is evaluated, so SUT modules pick up the mocked httpFetch on first import.
# Tests that don't touch httpFetch are unaffected (the mock is only invoked when
# the wrapper is actually called); tests that pass their own `fetchImpl` argument
# bypass httpFetch entirely.
preload = ["./src/test/env-bootstrap.ts", "./src/test/mock-http.ts"]
