# Local development DB — real Postgres 17 for contributors.
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   bun run db:push        # apply schema to local DB
#   docker compose -f docker-compose.dev.yml down -v   # wipe data
#
# Connect with: postgres://postgres:postgres@localhost:5432/app_dev
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
