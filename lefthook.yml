# https://lefthook.dev/configuration/
pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css}"
      run: bunx biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  jobs:
    - name: typecheck
      run: bun run typecheck
    - name: biome-check
      run: bun run check
    - name: build
      run: bun run build
    - name: test
      run: bun run test
