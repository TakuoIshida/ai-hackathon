# Local Docker test — mirrors prod images
# Usage:
#   cp .env.example .env   # fill in real values, then:
#   docker compose up --build
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: ai-hackathon-api:local
    ports:
      - "8787:8787"
    environment:
      NODE_ENV: production
      PORT: 8787
      DATABASE_URL: ${DATABASE_URL:-}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8787/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8787}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
    image: ai-hackathon-web:local
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
